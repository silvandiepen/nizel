name: Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Version packages
        run: node scripts/version-workspaces-for-publish.mjs

      - name: Generate release notes
        run: node scripts/generate-release-notes.mjs

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run

      - name: Publish nizel
        run: node scripts/publish-workspace-if-new.mjs nizel

      - name: Publish plugin-abbr
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-abbr

      - name: Publish plugin-autolink
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-autolink

      - name: Publish plugin-code-copy
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-code-copy

      - name: Publish plugin-citations
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-citations

      - name: Publish plugin-shiki
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-shiki

      - name: Publish plugin-alert
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-alert

      - name: Publish plugin-deflist
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-deflist

      - name: Publish plugin-details
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-details

      - name: Publish plugin-diagrams
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-diagrams

      - name: Publish plugin-emoji
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-emoji

      - name: Publish plugin-footnotes
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-footnotes

      - name: Publish plugin-frontmatter-ui
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-frontmatter-ui

      - name: Publish plugin-gfm
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-gfm

      - name: Publish plugin-heading-anchors
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-heading-anchors

      - name: Publish plugin-math
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-math

      - name: Publish plugin-media
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-media

      - name: Publish plugin-sanitize
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-sanitize

      - name: Publish plugin-task-list
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-task-list

      - name: Publish plugin-toc
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-toc

      - name: Publish plugin-typography
        run: node scripts/publish-workspace-if-new.mjs nizel-plugin-typography

      - name: Publish nizel-format
        run: node scripts/publish-workspace-if-new.mjs nizel-format

      - name: Publish nizel-kit
        run: node scripts/publish-workspace-if-new.mjs nizel-kit

      - name: Commit release files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json packages/*/package.json documentation/release-notes/
          git diff --cached --quiet || git commit -m "chore: version packages and generate release notes"
          git push
