name: Deploy Docs

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build local Nizel packages
        run: npm run build --workspace nizel --workspace nizel-plugin-abbr --workspace nizel-plugin-alert --workspace nizel-plugin-autolink --workspace nizel-plugin-citations --workspace nizel-plugin-code-copy --workspace nizel-plugin-deflist --workspace nizel-plugin-details --workspace nizel-plugin-diagrams --workspace nizel-plugin-emoji --workspace nizel-plugin-footnotes --workspace nizel-plugin-frontmatter-ui --workspace nizel-plugin-heading-anchors --workspace nizel-plugin-math --workspace nizel-plugin-media --workspace nizel-plugin-sanitize --workspace nizel-plugin-shiki --workspace nizel-plugin-toc --workspace nizel-plugin-typography

      - name: Build documentation
        working-directory: documentation
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: documentation
        run: npx wrangler pages deploy public --project-name=nizel-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
