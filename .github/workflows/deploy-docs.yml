name: Deploy Docs

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - development
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to deploy to Cloudflare Pages
        required: false
        default: development

concurrency:
  group: deploy-docs-${{ github.event.workflow_run.head_branch || inputs.deploy_branch || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || inputs.deploy_branch || github.ref_name }}
      DEPLOY_REF: ${{ github.event.workflow_run.head_sha || inputs.deploy_branch || github.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        working-directory: documentation
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: documentation
        run: npx wrangler pages deploy public --project-name=nizel-docs --branch "$DEPLOY_BRANCH"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
